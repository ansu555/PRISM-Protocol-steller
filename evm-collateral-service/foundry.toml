[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.24"

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
arb_sepolia  = "${ARB_SEPOLIA_RPC_URL}"
eth_sepolia  = "${ETH_SEPOLIA_RPC_URL}"
base         = "${BASE_MAINNET_RPC_URL}"
arbitrum     = "${ARB_MAINNET_RPC_URL}"
mainnet      = "${ETH_MAINNET_RPC_URL}"
polygon      = "${POLYGON_MAINNET_RPC_URL}"
polygon_amoy = "${POLYGON_AMOY_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}",    url = "https://api-sepolia.basescan.org/api" }
arb_sepolia  = { key = "${ARBISCAN_API_KEY}",    url = "https://api-sepolia.arbiscan.io/api" }
eth_sepolia  = { key = "${ETHERSCAN_API_KEY}",   url = "https://api-sepolia.etherscan.io/api" }
base         = { key = "${BASESCAN_API_KEY}",    url = "https://api.basescan.org/api" }
arbitrum     = { key = "${ARBISCAN_API_KEY}",    url = "https://api.arbiscan.io/api" }
mainnet      = { key = "${ETHERSCAN_API_KEY}",   url = "https://api.etherscan.io/api" }
polygon      = { key = "${POLYGONSCAN_API_KEY}", url = "https://api.polygonscan.com/api" }
polygon_amoy = { key = "${POLYGONSCAN_API_KEY}", url = "https://api-amoy.polygonscan.com/api" }
